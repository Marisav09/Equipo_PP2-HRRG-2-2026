<section class="chat-messages" id="chat-messages" aria-live="polite">
    <article class="message assistant">
        <div class="avatar ai-avatar" aria-hidden="true"></div>
        <div class="message-content">
            <div class="bubble">
                <span class="initial-greeting">Hola!!</span><br><br>
                Soy tu asistente de Ingeniería Clínica.<br><br>
                Equipo seleccionado:<br>
                <strong class="initial-equipment-name">{{ equipment.name if equipment else "Equipo no reconocido" }}</strong><br><br>
                ¿En qué puedo ayudarte?
            </div>
        </div>
    </article>
</section>

<section class="status-strip compact-status-strip" id="status-strip" aria-live="polite">
    <span>Sistema listo con contexto documental del equipo seleccionado.</span>
</section>

<form class="composer chatgpt-composer" id="chat-form">
    <button class="round-button" type="button" id="voice-button" title="Entrada por voz" aria-label="Entrada por voz">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><path d="M12 19v3"/></svg>
    </button>
    <input id="message-input" name="message" type="text" autocomplete="off" placeholder="Pregunta sobre fallas, uso, alarmas o mantenimiento..." required>
    <button class="stop-button" type="button" id="abort-button" title="Detener generación" aria-label="Detener generación" disabled>
        <span aria-hidden="true"></span>
        <em>Detener</em>
    </button>
    <button class="primary-button send-button" type="submit" title="Enviar" aria-label="Enviar">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
    </button>
</form>
