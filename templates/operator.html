{% extends "base.html" %}

{% block title %}Operador | HRRG{% endblock %}

{% block content %}
<main class="app-shell chat-product-shell operator-shell" data-role="operador" data-equipment-id="{{ equipment.id if equipment else '' }}" data-equipment-name="{{ equipment.name if equipment else '' }}">
    <aside class="operator-history-sidebar" aria-label="Historial del operador">
        <div class="operator-sidebar-brand">
            <img src="{{ url_for('static', filename='img/hrrg-logo.svg') }}" alt="HRRG">
            <span>Ingeniería Clínica</span>
        </div>
        <div class="operator-history-heading">
            <h2>Historial</h2>
            <p>Últimos 5 chats</p>
        </div>
        <div class="operator-history-list" id="operator-history-list"></div>
    </aside>

    <section class="workspace operator-workspace chat-workspace">
        <header class="chat-compact-topbar">
            <a class="chat-nav-action" href="{{ url_for('web.operator_equipment_selector') }}">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/><path d="M9 12h12"/></svg>
                <span>Cambiar equipo</span>
            </a>
            <div class="chat-active-equipment" aria-live="polite">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v10H4z"/><path d="M8 20h8M12 16v4"/><path d="m7 11 3 0 2-4 2 8 2-4h2"/></svg>
                <strong id="active-equipment">{{ equipment.name if equipment else "Equipo no reconocido" }}</strong>
            </div>
            <div class="chat-topbar-actions">
                <button class="chat-nav-action speech-toggle-button" type="button" id="speech-toggle-button" aria-label="Silenciar lectura en voz alta"></button>
                <button class="chat-nav-action chat-logout-action" type="button" id="logout-button" aria-label="Salir">
                    <span>Salir</span>
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
                </button>
            </div>
        </header>

        {% include "partials/chat_panel.html" %}
    </section>
</main>
{% endblock %}
