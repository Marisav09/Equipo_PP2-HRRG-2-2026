{% extends "base.html" %}

{% block title %}Login Tecnico | HRRG{% endblock %}

{% block content %}
<main class="login-screen">
    <section class="login-panel">
        <p class="eyebrow">Hospital Regional Rio Grande</p>
        <h1>Ingenieria Clinica</h1>
        <p class="muted">Acceso tecnico al asistente documental local.</p>

        <form class="login-form" id="login-form">
            <label>
                Usuario
                <input type="text" name="username" value="tecnico" autocomplete="username">
            </label>
            <label>
                Contrasena
                <input type="password" name="password" autocomplete="current-password" required>
            </label>
            <button class="primary-button" type="submit">Ingresar</button>
            <p class="form-error" id="login-error" hidden>Credenciales invalidas.</p>
        </form>
    </section>
</main>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/technician.js') }}"></script>
{% endblock %}
